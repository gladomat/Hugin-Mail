version: v1
changelog: |
  v1 - seed taxonomy (PRD v0.2 §7). Definitions sharpened to disambiguate
  boundary cases surfaced by model comparison: correspondence-vs-broadcast
  (keep), and automated alerts vs subscribed digests (notification/newsletter).
tags:
  - name: keep
    definition: >-
      Personal or work correspondence written directly to you by a human.
      NOT automated, NOT published/broadcast content, NOT job alerts.
  - name: receipt
    definition: Purchase confirmations, invoices, bank/brokerage statements.
    subtags: [receipt/bank, receipt/purchase, receipt/subscription]
  - name: notification
    definition: >-
      Automated transactional message, non-financial. Includes shipping/order
      status, CI/build, calendar invites, security alerts, and per-listing job
      alerts (a single automated posting).
  - name: newsletter
    definition: >-
      Subscribed periodic/broadcast content. Includes Substack/blog essays,
      media briefings, market updates, and recurring job DIGESTS (weekly
      round-ups of many listings).
  - name: junk
    definition: Unsolicited marketing, cold outreach, promotions, expired offers.
    subtags: [junk/marketing]
  - name: unclassified
    definition: Explicit residual bucket; must trend to zero by end of Pass 4.
keyword_rules:
  - tag: junk
    fields: [subject, snippet]
    keywords: [unsubscribe, "% off", sale, "limited offer", "act now"]
  - tag: receipt
    fields: [subject]
    keywords: [invoice, receipt, statement, order confirmation, payment]
  - tag: notification
    fields: [subject]
    keywords: [shipped, delivered, "build passed", "build failed", reminder]
  - tag: newsletter
    fields: [subject, snippet]
    keywords: [newsletter, digest, weekly, "this week"]
